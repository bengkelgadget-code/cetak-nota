<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRFBT - Pro Bluetooth Print</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F8F9FE; -webkit-tap-highlight-color: transparent; }
        .receipt-font { font-family: 'JetBrains Mono', monospace; }
        .gradient-bg { background: linear-gradient(135deg, #4F46E5 0%, #3B82F6 100%); }
        .card-shadow { box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05); }
        .loading-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(255,255,255,0.9); z-index: 10000;
            align-items: center; justify-content: center;
        }
        .receipt-paper { background: white; position: relative; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1)); }
        .receipt-paper::before, .receipt-paper::after {
            content: ""; position: absolute; left: 0; right: 0; height: 10px;
            background-size: 20px 20px; background-repeat: repeat-x;
        }
        .receipt-paper::before { top: -10px; background-image: radial-gradient(circle at 10px 10px, white 10px, transparent 0); }
        .receipt-paper::after { bottom: -10px; background-image: radial-gradient(circle at 10px 0, white 10px, transparent 0); }
        button:active { transform: scale(0.96); transition: 0.1s; }
    </style>
</head>
<body class="pb-24">

    <!-- KONFIGURASI API (GANTI DENGAN URL /exec ANDA) -->
    <script>
        const API_URL = "MASUKKAN_URL_WEB_APP_ANDA_DI_SINI";
    </script>

    <div id="loader" class="loading-overlay">
        <div class="flex flex-col items-center gap-3">
            <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-b-4 border-indigo-600"></div>
            <span id="loader-text" class="text-xs font-bold text-indigo-600 uppercase tracking-widest">Processing...</span>
        </div>
    </div>

    <input type="file" id="gallery-input" accept="image/*" class="hidden">

    <!-- PAGE 1: BERANDA -->
    <div id="page-home" class="max-w-md mx-auto px-5 pt-6">
        <div class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 bg-gray-800 rounded-lg flex items-center justify-center shadow-lg"><span class="text-white font-bold text-xl">T</span></div>
                <h1 class="text-2xl font-black text-gray-800 tracking-tighter uppercase">Trfbt</h1>
            </div>
            <div id="bt-status" class="flex items-center gap-2 bg-red-50 px-3 py-1.5 rounded-full border border-red-100">
                <div class="w-2 h-2 bg-red-500 rounded-full"></div>
                <span class="text-[9px] font-bold text-red-600 uppercase">Offline</span>
            </div>
        </div>

        <div class="space-y-4 mb-8">
            <button onclick="handleMenuClick('Transfer')" class="w-full relative overflow-hidden gradient-bg rounded-[32px] p-8 text-left shadow-xl shadow-indigo-100">
                <div class="z-10 relative text-white">
                    <h2 class="text-xl font-bold mb-2">Cetak Transfer</h2>
                    <p class="text-indigo-100 text-xs opacity-90 leading-relaxed">Bluetooth aktif. Kualitas HD Tajam.</p>
                </div>
                <div class="absolute -right-4 -bottom-4 w-32 h-32 bg-white opacity-10 rounded-full"></div>
            </button>
        </div>

        <h3 class="text-xs font-bold text-gray-400 mb-4 uppercase tracking-widest px-1">Riwayat Cetak</h3>
        <div id="history-list" class="space-y-3 pb-10">
            <!-- Data dari Sheets -->
        </div>
    </div>

    <!-- PAGE 2: PREVIEW & BLUETOOTH PRINT -->
    <div id="page-preview" class="hidden max-w-md mx-auto pt-4 flex flex-col h-screen overflow-hidden">
        <div class="px-5 flex items-center gap-4 mb-6">
            <button onclick="switchPage('home')" class="p-3 bg-white border border-gray-100 rounded-2xl shadow-sm">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg>
            </button>
            <h2 class="text-xl font-bold text-gray-800 tracking-tight">Koneksi & Cetak</h2>
        </div>

        <div class="flex-1 overflow-y-auto px-10 py-5 bg-slate-50/50">
            <div class="receipt-paper p-8 text-center text-gray-800 text-[11px] receipt-font leading-relaxed max-w-xs mx-auto" id="printable-receipt">
                <div contenteditable="true" id="r-toko" class="font-bold text-[14px] mb-1 uppercase">Bengkel Gadget L2</div>
                <div contenteditable="true" id="r-alamat" class="mb-2 uppercase text-[10px]">Jl. Pahlawan (Poros L2)</div>
                <div class="py-1 text-gray-400"><span>==============================</span></div>
                <div class="flex justify-between items-center text-left"><span>TGL</span><span id="r-tgl">--/--/----</span></div>
                <div class="flex justify-between items-center text-left mb-2"><span>JAM</span><span id="r-jam">--:--:--</span></div>
                <div class="border-t border-dashed border-gray-300 py-1"></div>
                <div contenteditable="true" id="r-nama" class="font-bold uppercase text-[12px] mt-2">NAMA PELANGGAN</div>
                <div contenteditable="true" id="r-tot" class="font-bold text-[14px] mt-2">Rp 5.000.000</div>
                <div class="mt-6 font-bold uppercase tracking-widest text-[9px]">** BERHASIL **</div>
            </div>
        </div>

        <div class="p-6 bg-white border-t border-gray-100 rounded-t-[35px] card-shadow">
            <button id="btn-main-print" onclick="startBluetoothPrint()" class="w-full bg-indigo-600 text-white font-black text-sm uppercase tracking-widest py-5 rounded-2xl shadow-xl shadow-indigo-100">
                PILIH PRINTER & CETAK
            </button>
        </div>
    </div>

    <script>
        const state = { currentType: '', printerChar: null };

        document.addEventListener('DOMContentLoaded', () => {
            fetchHistory();
            document.getElementById('gallery-input').onchange = () => { 
                document.getElementById('page-home').classList.add('hidden');
                document.getElementById('page-preview').classList.remove('hidden');
                updateTime(); 
            };
        });

        function updateTime() {
            const now = new Date();
            document.getElementById('r-tgl').innerText = now.toLocaleDateString();
            document.getElementById('r-jam').innerText = now.toLocaleTimeString();
        }

        function switchPage(p) {
            if(p === 'home') {
                document.getElementById('page-preview').classList.add('hidden');
                document.getElementById('page-home').classList.remove('hidden');
            }
        }

        function handleMenuClick(type) { 
            state.currentType = type; 
            document.getElementById('gallery-input').click(); 
        }

        async function startBluetoothPrint() {
            if (!navigator.bluetooth) { alert("Gunakan Browser Chrome."); return; }
            try {
                // DI HOSTING: Navigator Bluetooth akan memunculkan daftar perangkat!
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: ['000018f0-0000-1000-8000-00805f9b34fb']
                });

                toggleLoader(true, "Connecting...");
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('000018f0-0000-1000-8000-00805f9b34fb');
                const characteristics = await service.getCharacteristics();
                state.printerChar = characteristics.find(c => c.properties.write || c.properties.writeWithoutResponse);

                if (state.printerChar) {
                    await executePrint();
                    await saveToSheet();
                }
            } catch (e) { toggleLoader(false); alert("BT: " + e.message); }
        }

        async function executePrint() {
            const encoder = new TextEncoder();
            const getT = (id) => document.getElementById(id).innerText;
            // Format ESC/POS
            let raw = "\x1b\x40\x1b\x61\x01\x1b\x45\x01" + getT('r-toko') + "\x1b\x45\x00\n" + 
                      getT('r-alamat') + "\n--------------------------------\n" +
                      "TGL: " + getT('r-tgl') + " | " + getT('r-jam') + "\n" +
                      getT('r-nama') + "\n" + getT('r-tot') + "\n\n\n\n\n";
            await state.printerChar.writeValue(encoder.encode(raw));
        }

        async function saveToSheet() {
            toggleLoader(true, "Saving...");
            const payload = { nama: document.getElementById('r-nama').innerText, tipe: state.currentType };
            await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
            toggleLoader(false);
            fetchHistory();
            switchPage('home');
        }

        async function fetchHistory() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                document.getElementById('history-list').innerHTML = data.map(item => `
                    <div class="bg-white rounded-3xl p-5 border border-gray-100 card-shadow flex justify-between items-center">
                        <div><h4 class="font-bold text-gray-800 text-sm uppercase">${item.nama}</h4><p class="text-[10px] text-gray-400 font-bold">${item.waktu}</p></div>
                        <div class="px-3 py-1 bg-indigo-50 rounded-lg text-[8px] font-black text-indigo-500 uppercase">${item.tipe}</div>
                    </div>`).join('');
            } catch(e) {}
        }

        function toggleLoader(s, t) {
            document.getElementById('loader-text').innerText = t;
            document.getElementById('loader').style.display = s ? 'flex' : 'none';
        }
    </script>
</body>
</html>
